<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:;"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<title>eNSP MCP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#1e1e2e;color:#cdd6f4;height:100vh;display:flex;flex-direction:column}
.hdr{padding:10px 16px;background:#181825;border-bottom:1px solid #313244;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:14px}.hl{display:flex;align-items:center;gap:8px}.hr{display:flex;align-items:center;gap:6px}
.btn{border:none;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.btn-scan{background:#89b4fa;color:#1e1e2e}.btn-upload{background:#a6e3a1;color:#1e1e2e}
.btn-nav{background:#313244;color:#cdd6f4}.btn-nav.active{background:#89b4fa;color:#1e1e2e}
.btn-refresh{background:#313244;color:#cdd6f4;font-size:10px;padding:4px 8px}
.btn:hover{opacity:0.85}#topoIn{display:none}.topo-ind{font-size:11px;color:#a6e3a1}
.content{flex:1;display:flex;overflow:hidden}
.sidebar{width:240px;background:#181825;border-right:1px solid #313244;display:flex;flex-direction:column;flex-shrink:0}
.pr{padding:10px 12px;border-bottom:1px solid #313244;display:flex;gap:6px;align-items:center}
.pr input{width:50px;background:#11111b;border:1px solid #313244;padding:4px;border-radius:4px;color:#cdd6f4;font-size:11px}
.dl{flex:1;overflow-y:auto;padding:6px}
.di{padding:8px;margin-bottom:4px;background:#11111b;border-radius:6px;display:flex;flex-direction:column;gap:4px;border-left:3px solid transparent}
.di:hover{background:#181825}.di.connected{border-left-color:#a6e3a1}
.di.unresponsive{border-left-color:#f9e2af}
.dh{display:flex;justify-content:space-between;align-items:center}.dinf{flex:1}
.dn{font-size:12px;display:flex;align-items:center;gap:4px}
.dn .ei{opacity:0;cursor:pointer;font-size:10px}.dn:hover .ei{opacity:1}
.dm{display:flex;gap:8px;align-items:center;margin-top:2px}
.dp{font-size:10px;color:#6c7086}.dt{font-size:9px;padding:1px 4px;border-radius:3px;background:#313244;color:#89b4fa}
.hb{width:6px;height:6px;border-radius:50%;display:inline-block}
.hb.alive{background:#a6e3a1}.hb.unresponsive{background:#f9e2af}.hb.dead{background:#f38ba8}
.dar{display:flex;gap:4px;justify-content:flex-end}
.cb{background:#a6e3a1;padding:3px 8px;border-radius:4px;cursor:pointer;color:#1e1e2e;font-size:10px;flex:1;border:none}
.cbg{background:#313244;color:#a6e3a1;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;flex:1;text-align:center;border:none}
.rnb{background:#313244;border:none;padding:3px 6px;border-radius:4px;cursor:pointer;color:#6c7086;font-size:9px}
.fnb{background:#313244;border:none;padding:3px 6px;border-radius:4px;cursor:pointer;color:#f9e2af;font-size:9px}
.db{background:#f38ba8;border:none;padding:3px 8px;border-radius:4px;cursor:pointer;color:#1e1e2e;font-size:10px;width:100%;margin-top:2px}
.ma{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs{background:#181825;border-bottom:1px solid #313244;display:flex;padding:0 8px;overflow-x:auto;min-height:36px}
.tab{padding:8px 14px;font-size:11px;color:#6c7086;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px;flex-shrink:0}
.tab:hover{color:#cdd6f4}.tab.active{color:#cdd6f4;border-bottom-color:#89b4fa}
.tab .cls{width:14px;height:14px;border-radius:50%;background:#313244;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;border:none;color:#6c7086;cursor:pointer}
.tab .cls:hover{background:#f38ba8;color:#1e1e2e}
.et{padding:8px 14px;font-size:11px;color:#6c7086}
.terminals{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px}
.tp{background:#11111b;border-radius:8px;display:none;flex-direction:column;height:300px;overflow:hidden}
.tp.active{display:flex}
.th{padding:6px 12px;background:#181825;border-bottom:1px solid #313244;font-size:11px;color:#89b4fa;display:flex;justify-content:space-between;align-items:center}
.th .ri{opacity:0;cursor:pointer;font-size:10px}.th:hover .ri{opacity:1}
.tb{flex:1;padding:10px;overflow-y:auto;font-family:Consolas,monospace;font-size:11px;line-height:1.5}
.tb .output{color:#a6e3a1;white-space:pre-wrap;word-break:break-all}
.tb .input{color:#89b4fa;white-space:pre-wrap}.tb .error{color:#f38ba8}.tb .system{color:#6c7086;font-style:italic}
.ti{display:flex;padding:6px 12px;gap:8px;border-top:1px solid #313244;background:#181825}
.ti .pm{color:#a6e3a1;font-size:11px;font-family:Consolas,monospace}
.ti input{flex:1;background:transparent;border:none;color:#cdd6f4;font-size:11px;font-family:Consolas,monospace;outline:none}
.logs{background:#181825;border-top:1px solid #313244;max-height:80px;overflow-y:auto;padding:6px 8px;font-size:10px}
.li{padding:1px 0}.li.success{color:#a6e3a1}.li.error{color:#f38ba8}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;z-index:1000}
.mc{background:#181825;padding:20px;border-radius:8px;min-width:300px}
.mt{font-size:14px;margin-bottom:12px}
.mi{width:100%;background:#11111b;border:1px solid #313244;padding:8px;border-radius:4px;color:#cdd6f4;font-size:12px;margin-bottom:12px}
.mb{display:flex;justify-content:flex-end;gap:8px}
.mbtn{padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;border:none}
.mbtn.cancel{background:#313244;color:#cdd6f4}.mbtn.confirm{background:#89b4fa;color:#1e1e2e}
.sp{display:none;flex:1;overflow-y:auto;padding:12px}
.sp.active{display:flex;flex-direction:column}
.cmd-card{background:#11111b;border-radius:6px;padding:10px;margin-bottom:6px}
.cmd-name{font-size:12px;color:#89b4fa;margin-bottom:4px}
.cmd-desc{font-size:11px;color:#a6adc8;margin-bottom:4px}
.cmd-meta{display:flex;gap:8px;font-size:10px;color:#6c7086}
.cmd-output{font-size:10px;color:#a6e3a1;background:#181825;padding:4px 6px;border-radius:3px;margin-top:4px;font-family:monospace}
.cmd-tag{font-size:9px;padding:1px 4px;border-radius:3px;background:#313244;color:#cba6f7;margin-right:4px}
.cmd-tags{margin-top:4px}
.risk-safe{color:#a6e3a1}.risk-low{color:#f9e2af}.risk-medium{color:#fab387}.risk-high{color:#f38ba8}
.status-badge{font-size:9px;padding:1px 4px;border-radius:3px}
.status-badge.verified{background:#1e1e2e;color:#a6e3a1}.status-badge.supported{background:#1e1e2e;color:#cba6f7}
.status-badge.failed{background:#1e1e2e;color:#f38ba8}.status-badge.unsupported{background:#1e1e2e;color:#6c7086}
.cmd-card.verified{border-left:3px solid #a6e3a1}.cmd-card.failed{border-left:3px solid #f38ba8}
.cmd-card.supported{border-left:3px solid #cba6f7}.cmd-card.unsupported{border-left:3px solid #6c7086}
.cap-section{margin-bottom:12px}
.cap-title{font-size:13px;margin-bottom:6px;font-weight:bold}
.cap-count{font-size:10px;color:#6c7086;margin-left:8px;font-weight:normal}
.filter-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.filter-row select,.filter-row input{background:#11111b;border:1px solid #313244;padding:4px 6px;border-radius:4px;color:#cdd6f4;font-size:11px}
.filter-row select{min-width:80px}
.kb-stats{display:flex;gap:16px;margin-bottom:12px;padding:8px;background:#11111b;border-radius:6px}
.kb-stat{text-align:center}.kb-stat .num{font-size:18px;color:#89b4fa;font-weight:bold}.kb-stat .lbl{font-size:10px;color:#6c7086}
.topo-empty{text-align:center;padding:40px;color:#6c7086;font-size:12px}
#topoCanvas{width:100%;flex:1;min-height:300px;background:#11111b;border-radius:6px;overflow:hidden;position:relative}
#topoInfo{font-size:11px;color:#6c7086;margin-top:6px}
.kb-tabs{display:flex;gap:2px;margin-bottom:10px;flex-wrap:wrap}
.kb-tab{padding:5px 10px;font-size:11px;color:#6c7086;cursor:pointer;border-radius:4px;background:#181825;border:1px solid #313244}
.kb-tab:hover{color:#cdd6f4;background:#313244}
.kb-tab.active{color:#1e1e2e;background:#89b4fa;border-color:#89b4fa}
.kb-section{display:none;flex:1;overflow-y:auto}
.kb-section.active{display:flex;flex-direction:column}
.bp-card{background:#11111b;border-radius:6px;padding:10px;margin-bottom:6px;border-left:3px solid #f9e2af}
.bp-card.critical{border-left-color:#f38ba8}.bp-card.high{border-left-color:#fab387}.bp-card.medium{border-left-color:#f9e2af}
.bp-rule{font-size:12px;color:#cdd6f4;font-weight:bold;margin-bottom:4px}
.bp-detail{font-size:11px;color:#a6adc8;margin-bottom:4px}
.bp-meta{display:flex;gap:8px;font-size:10px;color:#6c7086}
.exp-card{background:#11111b;border-radius:6px;padding:12px;margin-bottom:8px;border-left:3px solid #89b4fa}
.exp-title{font-size:13px;color:#89b4fa;font-weight:bold;margin-bottom:6px}
.exp-section{margin-top:8px}
.exp-section-title{font-size:11px;color:#cba6f7;font-weight:bold;margin-bottom:4px}
.exp-item{font-size:11px;color:#a6adc8;padding:2px 0;padding-left:8px;border-left:2px solid #313244;margin-bottom:2px}
.exp-cmd{font-family:Consolas,monospace;color:#a6e3a1;font-size:11px}
.ts-card{background:#11111b;border-radius:6px;padding:10px;margin-bottom:6px;border-left:3px solid #f38ba8}
.ts-title{font-size:12px;color:#f38ba8;font-weight:bold;margin-bottom:4px}
.ts-field{font-size:11px;margin-bottom:3px}
.ts-label{color:#cba6f7;font-weight:bold}
.ts-value{color:#a6adc8}
.ts-cmd{font-family:Consolas,monospace;color:#a6e3a1;font-size:10px}
.topic-card{background:#11111b;border-radius:6px;padding:10px;margin-bottom:8px}
.topic-title{font-size:12px;color:#cba6f7;font-weight:bold;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.topic-cmds{margin-top:6px}
.topic-cmd{font-size:11px;padding:3px 0;display:flex;gap:8px;border-bottom:1px solid #1e1e2e}
.topic-cmd .cmd-c{font-family:Consolas,monospace;color:#a6e3a1;min-width:280px}
.topic-cmd .cmd-d{color:#a6adc8}
.topic-tip{font-size:10px;color:#f9e2af;padding:4px 8px;background:#1e1e2e;border-radius:3px;margin-top:4px}
.order-step{font-size:11px;color:#a6adc8;padding:4px 8px;background:#11111b;border-radius:4px;margin-bottom:3px;display:flex;gap:8px}
.order-step .step-n{color:#89b4fa;font-weight:bold;min-width:24px}
.device-sel{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.device-sel-btn{padding:3px 8px;font-size:10px;border-radius:4px;border:1px solid #313244;background:#181825;color:#6c7086;cursor:pointer}
.device-sel-btn:hover{color:#cdd6f4;background:#313244}
.device-sel-btn.active{background:#89b4fa;color:#1e1e2e;border-color:#89b4fa}
.view-sel{display:flex;gap:4px;margin-bottom:8px}
.view-sel-btn{padding:3px 10px;font-size:10px;border-radius:4px;border:1px solid #313244;background:#181825;color:#6c7086;cursor:pointer}
.view-sel-btn:hover{color:#cdd6f4}
.view-sel-btn.active{background:#cba6f7;color:#1e1e2e;border-color:#cba6f7}
</style>
</head>
<body>
<div class="hdr">
  <div class="hl">
    <h1>eNSP MCP</h1>
    <button class="btn btn-scan" onclick="scanDevices()">扫描</button>
    <button class="btn btn-upload" onclick="document.getElementById('topoIn').click()">上传拓扑</button>
    <input type="file" id="topoIn" style="display:none" accept=".json,.txt,.xml,.topo,.yml,.yaml,.csv,.cfg,.conf" onchange="uploadTopo(this.files[0])">
  </div>
  <div class="hr">
    <span id="topoInd" class="topo-ind"></span>
    <button class="btn btn-nav" id="nCat" onclick="sw('cat')">命令目录</button>
    <button class="btn btn-nav" id="nCap" onclick="sw('cap')">设备能力</button>
    <button class="btn btn-nav" id="nKb" onclick="sw('kb')">知识库</button>
    <button class="btn btn-nav" id="nTopo" onclick="sw('topo')">拓扑</button>
  </div>
</div>

<div class="content">
  <div class="sidebar">
    <div class="pr">
      <input type="number" id="sP" value="2000" min="1" max="65535">
      <span style="color:#6c7086">-</span>
      <input type="number" id="eP" value="2050" min="1" max="65535">
    </div>
    <div class="dl" id="dList">
      <div style="padding:20px;text-align:center;color:#6c7086;font-size:11px">点击扫描搜索设备</div>
    </div>
  </div>

  <div class="ma">
    <div class="tabs" id="tabs">
      <div class="et">等待设备连接...</div>
    </div>
    <div class="terminals" id="terminals"></div>

    <div class="sp" id="vCat">
      <div class="filter-row">
        <select id="catCat"><option value="">全部分类</option><option value="display">Display</option><option value="config">Config</option><option value="verify">Verify</option><option value="diagnostic">Diagnostic</option></select>
        <select id="catDev"><option value="">全部设备</option><option value="huawei">Huawei</option><option value="h3c">H3C</option><option value="cisco">Cisco</option><option value="juniper">Juniper</option></select>
        <select id="catRisk"><option value="">全部风险</option><option value="safe">Safe</option><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select>
        <button class="btn btn-scan" onclick="loadCat()" style="font-size:10px;padding:3px 8px">筛选</button>
      </div>
      <div style="font-size:11px;color:#6c7086;margin-bottom:8px">Total: <span id="catCount">0</span> 条命令</div>
      <div id="catList"></div>
    </div>

    <div class="sp" id="vCap">
      <div style="font-size:11px;color:#6c7086;margin-bottom:8px">已记录设备: <span id="capDevCount">0</span></div>
      <div id="capList"></div>
    </div>

    <div class="sp" id="vKb">
      <div class="kb-stats">
        <div class="kb-stat"><div class="num" id="kbTotal">0</div><div class="lbl">运行时命令</div></div>
        <div class="kb-stat"><div class="num" id="kbDevs">0</div><div class="lbl">设备数</div></div>
        <div class="kb-stat"><div class="num" id="kbExpCount">0</div><div class="lbl">实验经验</div></div>
        <div class="kb-stat"><div class="num" id="kbBpCount">0</div><div class="lbl">操作规范</div></div>
        <div class="kb-stat"><div class="num" id="kbTsCount">0</div><div class="lbl">排障案例</div></div>
      </div>
      <div class="kb-tabs">
        <div class="kb-tab active" onclick="switchKbTab('structured', this)">结构化命令</div>
        <div class="kb-tab" onclick="switchKbTab('bestpractice', this)">操作规范</div>
        <div class="kb-tab" onclick="switchKbTab('experience', this)">实验经验</div>
        <div class="kb-tab" onclick="switchKbTab('troubleshoot', this)">排障知识</div>
        <div class="kb-tab" onclick="switchKbTab('configorder', this)">配置顺序</div>
        <div class="kb-tab" onclick="switchKbTab('runtime', this)">运行时记录</div>
      </div>
      <div class="kb-section active" id="kbStructured">
        <div class="device-sel" id="kbDeviceSel"></div>
        <div class="view-sel">
          <div class="view-sel-btn active" onclick="switchKbView('both', this)">全部视图</div>
          <div class="view-sel-btn" onclick="switchKbView('user_view', this)">用户视图 &lt;&gt;</div>
          <div class="view-sel-btn" onclick="switchKbView('system_view', this)">系统视图 []</div>
        </div>
        <div id="kbStructuredContent"></div>
      </div>
      <div class="kb-section" id="kbBestpractice"><div id="kbBpContent"></div></div>
      <div class="kb-section" id="kbExperience"><div id="kbExpContent"></div></div>
      <div class="kb-section" id="kbTroubleshoot"><div id="kbTsContent"></div></div>
      <div class="kb-section" id="kbConfigorder"><div id="kbCoContent"></div></div>
      <div class="kb-section" id="kbRuntime">
        <div class="filter-row">
          <select id="kbCatF"><option value="">全部分类</option><option value="display">Display</option><option value="config">Config</option><option value="verify">Verify</option></select>
          <button class="btn btn-scan" onclick="loadKbRuntime()" style="font-size:10px;padding:3px 8px">筛选</button>
        </div>
        <div id="kbList"></div>
      </div>
    </div>

    <div class="sp" id="vTopo">
      <div id="topoCanvas"></div>
      <div id="topoInfo"></div>
    </div>

    <div class="logs" id="logs"></div>
  </div>
</div>

<div id="renameModal" class="modal" style="display:none">
  <div class="mc">
    <div class="mt">重命名设备</div>
    <input type="text" id="renameInput" class="mi" placeholder="输入设备名称">
    <div class="mb">
      <button class="mbtn cancel" onclick="closeRM()">取消</button>
      <button class="mbtn confirm" onclick="confirmRM()">确定</button>
    </div>
  </div>
</div>

<script src="/static/socket.io.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
